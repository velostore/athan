<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>أذان — مواقيت الصلاة</title>
    <script>
      // SPA redirect for GitHub Pages — TanStack Router handles the route
      const segmentCount = window.location.pathname.split("/").length - 1;
      const rootPath = "../".repeat(segmentCount) || ".";
      window.location.replace(
        rootPath + "/index.html?redirect=" + encodeURIComponent(window.location.pathname + window.location.search)
      );
    </script>
  </head>
  <body>
    <p>جاري تحويلك...</p>
  </body>
</html>
