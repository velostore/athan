<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <circle cx="380" cy="140" r="60" fill="url(#moon)"/>
  <circle cx="400" cy="120" r="50" fill="url(#bg)"/>
  <!-- Mosque -->
  <rect x="156" y="300" width="200" height="140" rx="8" fill="#1e293b"/>
  <!-- Dome -->
  <path d="M176 300 Q256 150 336 300 Z" fill="#334155"/>
  <circle cx="256" cy="165" r="8" fill="#fbbf24"/>
  <!-- Minarets -->
  <rect x="140" y="220" width="24" height="220" rx="4" fill="#1e293b"/>
  <circle cx="152" cy="215" r="6" fill="#fbbf24"/>
  <rect x="348" y="220" width="24" height="220" rx="4" fill="#1e293b"/>
  <circle cx="360" cy="215" r="6" fill="#fbbf24"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="60" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="130" cy="150" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="80" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="200" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="440" cy="200" r="2.5" fill="#fff" opacity="0.4"/>
  <!-- Prayer text -->
  <text x="256" y="480" font-family="system-ui, sans-serif" font-size="36" fill="#fbbf24" text-anchor="middle" font-weight="bold">أذان</text>
</svg>
